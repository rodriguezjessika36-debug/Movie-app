@if (movie(); as m) {
  <div class="max-w-md mx-auto mt-10 p-6 bg-white border rounded-xl shadow-md">
    <h1 class="text-2xl font-bold text-gray-900 mb-4">{{ m.title }}</h1>
    <p class="text-gray-700"><span class="font-semibold">Director:</span> {{ m.director }}</p>
    <p class="text-gray-700 mb-6"><span class="font-semibold">Género:</span> {{ m.genre }}</p>

    <button
      (click)="volverAlListado()"
      class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors"
    >
      Volver al listado
    </button>
  </div>
} @else {
  <div class="max-w-md mx-auto mt-10 p-6 text-center text-gray-600">
    <p class="mb-4">No se encontró ninguna película con ese identificador.</p>
    <button
      (click)="volverAlListado()"
      class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors"
    >
      Volver al listado
    </button>
  </div>
}
