<h1 class="text-2xl font-bold text-gray-900 p-6">Listado de Películas</h1>

<ul class="flex flex-col gap-4 max-w-2xl mx-auto px-6">
  @for (movie of movies; track movie.id) {
    <li class="border rounded-xl p-5 shadow-sm hover:shadow-md transition-shadow bg-white">
      <a
        [routerLink]="['/movies', movie.id]"
        class="text-lg font-semibold text-blue-600 hover:underline"
      >
        {{ movie.title }}
      </a>
      <p class="text-sm text-gray-600 mt-1">Director: {{ movie.director }}</p>
      <p class="text-sm text-gray-600">Género: {{ movie.genre }}</p>
    </li>
  }
</ul>
