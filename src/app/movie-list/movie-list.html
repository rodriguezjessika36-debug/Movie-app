<h1 class="text-2xl font-bold p-4">Listado de Películas</h1>

<ul class="flex flex-col gap-3 p-4">
  @for (movie of movies; track movie.id) {
    <li class="border rounded-lg p-4 shadow-sm hover:shadow-md transition-shadow">
      <a
        [routerLink]="['/movies', movie.id]"
        class="text-lg font-semibold text-blue-600 hover:underline"
      >
        {{ movie.title }}
      </a>
      <p class="text-sm text-gray-600">Director: {{ movie.director }}</p>
      <p class="text-sm text-gray-600">Género: {{ movie.genre }}</p>
    </li>
  }
</ul>
